name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (offline — Ollama client mocked in %test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # No LAN Ollama host is required: the typed OllamaClient is replaced with a
      # Mockito mock in the test profile (see OllamaToolCallTest), so the suite never
      # touches 192.168.1.5.
      - name: Verify
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
