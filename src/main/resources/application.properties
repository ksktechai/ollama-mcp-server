# ===========================================================================
# ollama-mcp-server — a thin MCP -> Ollama REST bridge.
# Everything is driven by config; nothing hard-codes the Ollama host.
# ===========================================================================

# --- Remote Ollama (the key configuration) ---------------------------------
# Ollama runs on a SEPARATE machine so the dev laptop is not overloaded.
# Override any of these via env (Quarkus auto-loads .env in dev).
ollama.base-url=${OLLAMA_BASE_URL:http://192.168.1.5:11434}
ollama.default-model=${OLLAMA_DEFAULT_MODEL:qwen3:30b}
ollama.timeout=${OLLAMA_TIMEOUT:120s}

# --- Typed REST client to Ollama (configKey = "ollama-api") ----------------
quarkus.rest-client.ollama-api.url=${ollama.base-url}
# Remote host + 30B model => a generous read timeout (ms).
quarkus.rest-client.ollama-api.read-timeout=120000

# --- MCP server (HTTP transport) -------------------------------------------
# quarkus-mcp-server-http enables BOTH transports out of the box; defaults are
# fine. The legacy HTTP/SSE endpoint is at /mcp/sse and the newer Streamable
# HTTP endpoint is at /mcp. The port defaults to 8085 (not 8080) so this server
# can run alongside other apps / Postman collections on 8080; override with
# MCP_HTTP_PORT.
quarkus.http.port=${MCP_HTTP_PORT:8085}
quarkus.mcp.server.server-info.name=ollama-mcp-server
# Log every MCP JSON-RPC message (request + response) natively — the idiomatic way to see /mcp
# traffic without a custom filter. text-limit caps each logged message (raise LOG_MAX_BODY for more).
quarkus.mcp.server.traffic-logging.enabled=${LOG_MCP:true}
quarkus.mcp.server.traffic-logging.text-limit=${LOG_MAX_BODY:2000}

# --- Newman runner (run_postman_collection tool) ---------------------------
# Default collection run when the tool is called with no path. Override per-call
# via the tool's collectionPath argument, or here via NEWMAN_COLLECTION.
app.newman.collection=${NEWMAN_COLLECTION:/Users/senthilkumar/google-ai/bian-fraud-detection/docs/postman/bian-fraud-detection.postman_collection.json}
# How Newman is invoked. Default needs no global install. If 'npx' is not on the
# server process's PATH, set NEWMAN_COMMAND to an absolute path (e.g. /usr/local/bin/newman).
app.newman.command=${NEWMAN_COMMAND:npx --yes newman}
app.newman.request-timeout-ms=${NEWMAN_REQUEST_TIMEOUT_MS:120000}
app.newman.run-timeout-seconds=${NEWMAN_RUN_TIMEOUT_SECONDS:600}
# Optional: keep the full Newman JSON report at a stable path (overwritten each run) so you can
# open it after a run. Blank = use a temp file and delete it. e.g. NEWMAN_REPORT_PATH=target/newman/last-report.json
app.newman.report-path=${NEWMAN_REPORT_PATH:}

# --- Logging — tool invocations (InvocationLoggingInterceptor) -------------
app.logging.max-body=${LOG_MAX_BODY:2000}
# surface the per-call correlation id (MDC) on every console log line
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) [%X{correlationId}] %s%e%n

# Inbound HTTP transport line per request (method, path, status, bytes, duration) via Quarkus'
# built-in access log. We rely on this for the transport line, the @Logged tool interceptor
# (>>> / <<<) for tool args + result, and ExternalClientLoggingFilter (==> / <==) for outbound
# Ollama calls. The tool + Ollama lines share one correlationId (same request thread/context);
# the access-log line is the transport record. Toggle with LOG_ACCESS.
quarkus.http.access-log.enabled=${LOG_ACCESS:true}
quarkus.http.access-log.pattern=%h "%r" %s %b bytes %D ms
quarkus.http.record-request-start-time=true

# ===========================================================================
# %test — point the REST client at a local WireMock stub so the suite is
# offline and deterministic. The port is set per-test via the
# "ollama.base-url" system property (see OllamaToolsWireMockTest); this default
# keeps tests off the LAN host (192.168.1.5) even if a test forgets to set it.
# ===========================================================================
%test.ollama.base-url=http://localhost:8089
%test.ollama.default-model=test-model
%test.quarkus.rest-client.ollama-api.url=${ollama.base-url}
# keep the test suite output quiet
%test.quarkus.mcp.server.traffic-logging.enabled=false
%test.quarkus.http.access-log.enabled=false
